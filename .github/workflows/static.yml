    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
        
        // Initialize AOS
        AOS.init({
            duration: 800,
            once: true,
            easing: 'ease-out-quad'
        });

        // Navbar scroll effect
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('glass', 'py-3', 'shadow-2xl');
                navbar.classList.remove('py-6');
            } else {
                navbar.classList.remove('glass', 'py-3', 'shadow-2xl');
                navbar.classList.add('py-6');
            }
        });

        // Mobile Menu Logic
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileLinks = document.querySelectorAll('.mobile-link');

        const toggleMenu = (show) => {
            mobileMenu.style.transform = show ? 'translateX(0)' : 'translateX(100%)';
        };

        menuBtn.addEventListener('click', () => toggleMenu(true));
        closeBtn.addEventListener('click', () => toggleMenu(false));
        mobileLinks.forEach(link => link.addEventListener('click', () => toggleMenu(false)));

        // Statistics Counter Animation
        const counters = document.querySelectorAll('.counter');
        const speed = 200;

        const animateCounters = () => {
            counters.forEach(counter => {
                const target = +counter.getAttribute('data-target');
                const updateCount = () => {
                    const count = +counter.innerText;
                    const inc = target / speed;
                    if (count < target) {
                        counter.innerText = Math.ceil(count + inc);
                        setTimeout(updateCount, 1);
                    } else {
                        counter.innerText = target + (target === 100 ? '' : '+');
                    }
                };
                updateCount();
            });
        };

        // Trigger animation when counter section is visible
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    animateCounters();
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.5 });

        document.querySelectorAll('.counter').forEach(c => observer.observe(c.parentElement));
    </script>
